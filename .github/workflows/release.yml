# Build the Claude Desktop bundle on each published Release and attach numen.mcpb
# to it. Smoke-gated so a broken build never ships. Zero-dep, so no install step —
# `npm run mcpb` fetches @anthropic-ai/mcpb via npx and packs numen-bridge.js +
# fs-channel.js + manifest.json into dist/numen.mcpb.
name: release-mcpb

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow a manual build from the Actions tab

permissions:
  contents: write          # upload the asset onto the release

jobs:
  build-mcpb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Smoke (gate the release)
        run: npm run smoke
      - name: Build the Claude Desktop bundle
        run: npm run mcpb
      - name: Attach numen.mcpb to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/numen.mcpb
      - name: Upload as a workflow artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: numen-mcpb
          path: dist/numen.mcpb
